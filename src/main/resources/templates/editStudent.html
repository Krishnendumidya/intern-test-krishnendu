<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f5f7fa;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:#0d6efd;
        }

        .sidebar h3{
            color:white;
            text-align:center;
            padding:20px;
            border-bottom:1px solid rgba(255,255,255,.2);
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            font-size:17px;
        }

        .sidebar a:hover{
            background:white;
            color:#0d6efd;
        }

        .content{
            margin-left:250px;
            padding:30px;
        }

        .card{
            border:none;
            border-radius:15px;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h3>SMS</h3>

    <a th:href="@{/dashboard}">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a th:href="@{/studentsPage}">
        <i class="bi bi-people-fill"></i> Students
    </a>

    <a th:href="@{/addStudent}">
        <i class="bi bi-person-plus-fill"></i> Add Student
    </a>

    <a th:href="@{/login}">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>

</div>

<div class="content">

    <div class="card shadow">

        <div class="card-header bg-warning">

            <h3>Edit Student</h3>

        </div>

        <div class="card-body">

            <form th:action="@{/students/update/{id}(id=${student.id})}"
                  th:object="${student}"
                  method="post">

                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Name</label>

                        <input type="text"
                               th:field="*{name}"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Email</label>

                        <input type="email"
                               th:field="*{email}"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Age</label>

                        <input type="number"
                               th:field="*{age}"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Course</label>

                        <input type="text"
                               th:field="*{course}"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label>Department</label>

                        <input type="text"
                               th:field="*{department}"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label>Phone</label>

                        <input type="text"
                               th:field="*{phone}"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-success">

                        <i class="bi bi-check-circle-fill"></i>

                        Update Student

                    </button>

                    <a th:href="@{/studentsPage}"
                       class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
