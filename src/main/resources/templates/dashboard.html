<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f5f7fa;
        }

        .sidebar{
            width:250px;
            height:100vh;
            position:fixed;
            left:0;
            top:0;
            background:#0d6efd;
            color:white;
        }

        .sidebar h3{
            padding:20px;
            text-align:center;
            border-bottom:1px solid rgba(255,255,255,.2);
        }

        .sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:15px 25px;
            font-size:18px;
        }

        .sidebar a:hover{
            background:white;
            color:#0d6efd;
        }

        .content{
            margin-left:250px;
        }

        .topbar{
            background:white;
            padding:15px 30px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        .dashboard-card{
            border:none;
            border-radius:15px;
            transition:.3s;
        }

        .dashboard-card:hover{
            transform:translateY(-5px);
        }

        .icon{
            font-size:45px;
        }

    </style>

</head>
<body>

<div class="sidebar">

    <h3>SMS</h3>

    <a href="/dashboard">
        <i class="bi bi-speedometer2"></i> Dashboard
    </a>

    <a href="/studentsPage">
        <i class="bi bi-people-fill"></i> Students
    </a>

    <a href="/addStudent">
        <i class="bi bi-person-plus-fill"></i> Add Student
    </a>

    <a href="/login">
        <i class="bi bi-box-arrow-right"></i> Logout
    </a>

</div>

<div class="content">

    <div class="topbar d-flex justify-content-between">

        <h3>Student Management Dashboard</h3>

    </div>

    <div class="container mt-4">

        <div class="row g-4">

            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center">

                    <div class="card-body">

                        <i class="bi bi-people-fill icon text-primary"></i>

                        <h3 class="mt-3">Students</h3>
                        <h1 th:text="${totalStudents}">0</h1>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center">

                    <div class="card-body">

                        <i class="bi bi-person-plus-fill icon text-success"></i>

                        <h3 class="mt-3">Add Student</h3>

                        <a href="/addStudent"
                           class="btn btn-success mt-3">
                            Add Student
                        </a>

                    </div>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card dashboard-card shadow text-center">

                    <div class="card-body">

                        <i class="bi bi-card-list icon text-warning"></i>

                        <h3 class="mt-3">View Students</h3>

                        <a href="/studentsPage"
                           class="btn btn-primary mt-3">
                            View List
                        </a>

                    </div>

                </div>

            </div>

        </div>

        <div class="card shadow mt-5">

            <div class="card-header bg-primary text-white">

                Recent Students

            </div>

            <div class="card-body">

                <table class="table table-bordered table-hover">

                    <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Age</th>
                        <th>Action</th>

                    </tr>

                    </thead>
                    <tbody>

                    <tr th:each="student : ${students}">

                        <td th:text="${student.id}"></td>

                        <td th:text="${student.name}"></td>

                        <td th:text="${student.email}"></td>

                        <td th:text="${student.course}"></td>

                        <td th:text="${student.age}"></td>

                        <td>

                            <a th:href="@{/students/edit/{id}(id=${student.id})}"
                               class="btn btn-warning btn-sm">
                                Edit
                            </a>

                            <a th:href="@{/students/delete/{id}(id=${student.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this student?')">
                                Delete
                            </a>

                        </td>

                    </tr>

                    <tr th:if="${#lists.isEmpty(students)}">

                        <td colspan="6" class="text-center text-muted">

                            No Students Available

                        </td>

                    </tr>

                    </tbody>
</html>
