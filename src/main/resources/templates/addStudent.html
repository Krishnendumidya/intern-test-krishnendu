<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand" href="/dashboard">
            Student Management System
        </a>

        <div>

            <a href="/dashboard" class="btn btn-light me-2">
                Dashboard
            </a>

            <a href="/studentsPage" class="btn btn-success me-2">
                Student List
            </a>

            <a href="/login" class="btn btn-danger">
                Logout
            </a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            <h3>Add Student</h3>
        </div>
        <div class="card-body">

            <div th:if="${success}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>
            <div th:if="${error}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/students}"
                  th:object="${student}"
                  method="post">

                <div class="mb-3">

                    <label>Name</label>

                    <input type="text"
                           th:field="*{name}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('name')}"
                         th:errors="*{name}">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input type="email"
                           th:field="*{email}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Age</label>

                    <input type="number"
                           th:field="*{age}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('age')}"
                         th:errors="*{age}">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Course</label>

                    <input type="text"
                           th:field="*{course}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('course')}"
                         th:errors="*{course}">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Department</label>

                    <input type="text"
                           th:field="*{department}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('department')}"
                         th:errors="*{department}">
                    </div>

                </div>

                <div class="mb-3">

                    <label>Phone</label>

                    <input type="text"
                           th:field="*{phone}"
                           class="form-control">

                    <div class="text-danger"
                         th:if="${#fields.hasErrors('phone')}"
                         th:errors="*{phone}">
                    </div>

                </div>

                <button type="submit" class="btn btn-success">
                    Save Student
                </button>

                <a th:href="@{/studentsPage}"
                   class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>



    </div>

</div>

</body>
</html>
